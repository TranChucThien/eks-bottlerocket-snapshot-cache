name: Create Bottlerocket EBS Snapshot

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS Region'
        required: true
        default: 'ap-northeast-1'
      environment:
        description: 'Environment (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      container_images:
        description: 'Container images (comma-separated)'
        required: true
        default: 'public.ecr.aws/eks-distro/kubernetes/pause:3.2'
      instance_type:
        description: 'EC2 instance type'
        required: false
        default: 't2.small'
      vpc_cidr:
        description: 'VPC CIDR'
        required: false
        default: '10.0.0.0/16'

permissions:
  contents: write

jobs:
  create-snapshot:
    runs-on: ubuntu-latest
    outputs:
      snapshot_id: ${{ steps.snapshot.outputs.snapshot_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        run: |
          mkdir -p ~/.aws
          echo '${{ secrets.AWS_CREDENTIALS }}' > ~/.aws/credentials
          printf '[default]\nregion = ${{ inputs.aws_region }}\n' > ~/.aws/config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Generate tfvars
        working-directory: terraform
        run: |
          AZ="${{ inputs.aws_region }}a"
          cat > terraform.tfvars <<EOF
          aws_region           = "${{ inputs.aws_region }}"
          project_name         = "eks-bottlerocket"
          environment          = "${{ inputs.environment }}"
          vpc_cidr             = "${{ inputs.vpc_cidr }}"
          azs                  = ["${AZ}"]
          public_subnet_cidrs  = ["10.0.1.0/24"]
          private_subnet_cidrs = []
          instance_type        = "${{ inputs.instance_type }}"
          container_images     = "${{ inputs.container_images }}"
          tags = {
            system       = "k+"
            map-migrated = "migDTX1AI6YIC"
          }
          EOF

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get Snapshot ID
        id: snapshot
        working-directory: terraform
        run: |
          SNAPSHOT_ID=$(terraform output -raw snapshot_id)
          echo "snapshot_id=$SNAPSHOT_ID" >> "$GITHUB_OUTPUT"

          echo "### Snapshot Created 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: \`${{ inputs.aws_region }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Snapshot: \`$SNAPSHOT_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Images: \`${{ inputs.container_images }}\`" >> "$GITHUB_STEP_SUMMARY"

      # 🔥 Upload state để job sau dùng
      - name: Upload Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: |
            terraform/terraform.tfstate
            terraform/terraform.tfstate.backup


  destroy-infra:
    needs: create-snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        run: |
          mkdir -p ~/.aws
          echo '${{ secrets.AWS_CREDENTIALS }}' > ~/.aws/credentials
          printf '[default]\nregion = ${{ inputs.aws_region }}\n' > ~/.aws/config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 🔥 Download lại state
      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: tfstate
          path: terraform/

      - name: Recreate tfvars
        working-directory: terraform
        run: |
          AZ="${{ inputs.aws_region }}a"
          cat > terraform.tfvars <<EOF
          aws_region           = "${{ inputs.aws_region }}"
          project_name         = "eks-bottlerocket"
          environment          = "${{ inputs.environment }}"
          vpc_cidr             = "${{ inputs.vpc_cidr }}"
          azs                  = ["${AZ}"]
          public_subnet_cidrs  = ["10.0.1.0/24"]
          private_subnet_cidrs = []
          instance_type        = "${{ inputs.instance_type }}"
          container_images     = "${{ inputs.container_images }}"
          tags = {
            system       = "k+"
            map-migrated = "migDTX1AI6YIC"
          }
          EOF

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform init
          terraform destroy -auto-approve
